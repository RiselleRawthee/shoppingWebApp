name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    name: Backend — Lint, Unit Tests, Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shoplite
          POSTGRES_PASSWORD: shoplite
          POSTGRES_DB: shoplite_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations on test DB
        env:
          DATABASE_URL: postgresql://shoplite:shoplite@localhost:5433/shoplite_test
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        env:
          DATABASE_URL: postgresql://shoplite:shoplite@localhost:5433/shoplite_test
          DATABASE_URL_TEST: postgresql://shoplite:shoplite@localhost:5433/shoplite_test
        run: npm run test:integration

  frontend-ci:
    name: Frontend — Lint, Tests, Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
