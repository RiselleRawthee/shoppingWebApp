services:
  db:
    image: postgres:16-alpine
    container_name: shoplite-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shoplite
      POSTGRES_PASSWORD: shoplite
      POSTGRES_DB: shoplite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoplite"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    image: postgres:16-alpine
    container_name: shoplite-db-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: shoplite
      POSTGRES_PASSWORD: shoplite
      POSTGRES_DB: shoplite_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shoplite"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
